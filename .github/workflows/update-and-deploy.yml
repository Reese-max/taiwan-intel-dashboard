name: 更新資料並部署

# 全雲端自動更新：在 GitHub 的 runner 上跑現有 Node 爬蟲管線，
# 把產出的靜態網站 force-push 到 gh-pages 分支（同時當「網站」與「增量狀態庫」）。
on:
  schedule:
    - cron: "5,35 * * * *" # 每30分鐘 :05/:35 → CWA+國際+警政+官方第一／二波（非 exclusive）
    - cron: "30 18 * * *" # 每日 18:30 UTC ≈ 02:30 台北 → full refresh（exclusive 清重建）
  workflow_dispatch:
    inputs:
      mode:
        description: "hourly（含官方第一／二波）/ cwa / international-* / cwa-international / twnews / daily / refresh"
        default: hourly
        type: choice
        options: [hourly, cwa, international, international-expanded, international-core, international-general, international-cyber, international-disaster, international-health, international-humanitarian, international-finance, cwa-international, twnews, daily, refresh, police]
      renorm_intl:
        description: "忽略國際快取、全部重新正規化（一次性，用於套用新風險校準）"
        default: false
        type: boolean

# peaceiris 需要 contents:write 才能推 gh-pages
permissions:
  contents: write

# 避免每小時/手動觸發互相重疊踩 gh-pages；排隊不取消（別中斷爬到一半）
concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # 2026-07-06 起國際 LLM 正規化劣化（129 批次含重試 ~25 分鐘），全 run 需 35-45 分；
    # 30 分鐘 timeout 導致 7/6 起所有排程/手動 run 於「抓取即時資料」被取消、資料停更一整天。
    timeout-minutes: 55
    steps:
      - name: Checkout 原始碼
        uses: actions/checkout@v4

      - name: 取回 gh-pages 既有資料（上一輪增量狀態）
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: prev-site
        continue-on-error: true # 第一輪 gh-pages 可能尚未存在

      - name: 還原上一輪狀態到 public/data
        run: |
          mkdir -p public/data
          if [ -d prev-site/data ]; then
            cp -f prev-site/data/*.json public/data/ 2>/dev/null || true
            echo "已還原 $(ls public/data | wc -l) 個狀態檔（去重指紋/歷史/快照得以延續）"
          else
            echo "尚無 gh-pages 舊資料 → 本輪從零開始（連續性自第二輪起建立）"
          fi
          rm -rf prev-site

      - name: 安裝 Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: 安裝相依
        run: npm ci

      - name: 由 Secrets 寫出臨時 .env（runner 即用即丟，不進版控）
        run: |
          cat > .env <<'EOF'
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL=${{ secrets.LLM_BASE_URL }}
          LLM_MODEL=${{ secrets.LLM_MODEL }}
          NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_BASE_URL=${{ secrets.NVIDIA_BASE_URL }}
          NVIDIA_MODEL=${{ secrets.NVIDIA_MODEL }}
          SUMMARY_LLM=${{ secrets.SUMMARY_LLM }}
          SUMMARY_API_KEY=${{ secrets.SUMMARY_API_KEY }}
          SUMMARY_BASE_URL=${{ secrets.SUMMARY_BASE_URL }}
          SUMMARY_MODEL=${{ secrets.SUMMARY_MODEL }}
          SUMMARY_MAX_CONCURRENCY=${{ secrets.SUMMARY_MAX_CONCURRENCY }}
          SUMMARY_TIMEOUT_MS=${{ secrets.SUMMARY_TIMEOUT_MS }}
          SUMMARY_MAX_RETRIES=${{ secrets.SUMMARY_MAX_RETRIES }}
          TWINKLE_MCP_URL=${{ secrets.TWINKLE_MCP_URL }}
          TWINKLE_MCP_TOKEN=${{ secrets.TWINKLE_MCP_TOKEN }}
          CWA_API_KEY=${{ secrets.CWA_API_KEY }}
          MOENV_API_KEY=${{ secrets.MOENV_API_KEY }}
          EOF

      - name: 決定抓取模式
        id: mode
        run: |
          node scripts/ci-fetch-mode.mjs \
            --schedule="${{ github.event.schedule }}" \
            --mode="${{ github.event.inputs.mode }}" \
            --github-output="$GITHUB_OUTPUT"

      - name: 抓取即時資料
        env:
          INTERNATIONAL_FEED_TIER: ${{ steps.mode.outputs.international_feed_tier }}
          INTERNATIONAL_FEED_TOPIC: ${{ steps.mode.outputs.international_feed_topic }}
          INTL_RENORM_ALL: ${{ github.event.inputs.renorm_intl }}
          NODE_OPTIONS: --use-system-ca
        run: node --env-file=.env scripts/fetch-live.mjs ${{ steps.mode.outputs.args }}

      - name: 驗證必要來源已更新
        env:
          ALLOW_STALE_CWA: ${{ vars.ALLOW_STALE_CWA }}
        run: node scripts/assert-pipeline-sources.mjs ${{ steps.mode.outputs.assert_args }}

      - name: 檢查新聞來源實際貢獻
        if: contains(steps.mode.outputs.args, 'twnews')
        run: npm run audit:news-source-contribution

      - name: 檢查結構化來源新鮮度
        run: npm run audit:source-freshness

      - name: 檢查 coverage 每日矩陣
        run: npm run audit:coverage

      - name: 執行測試
        run: npm test

      - name: 建置靜態網站
        run: npm run build

      - name: 檢查情報網品質
        run: npm run audit:network-quality

      # 國際風險分布健康稽核：偵測明顯病態（high 洗版／low 被洗光／medium 崩塌）。
      # 觀察期先不擋部署（continue-on-error），穩定兩週後再決定是否升級為 gate。
      - name: 檢查國際風險分布
        continue-on-error: true
        run: npm run audit:intl-risk

      # 資料檔尺寸保險絲：Cloudflare Pages 單檔 25MiB 上限，超過整個部署失敗。
      # 24MB 硬擋（本次仍可部署，但逼近上限必須立刻處理保留窗）。
      - name: 檢查資料檔尺寸
        run: npm run audit:data-size -- --max-mb=24

      - name: 清除臨時 .env
        if: always()
        run: rm -f .env

      # gh-pages 分支＝增量狀態庫（下一輪 restore 從這裡撈上一輪 ledger/history）。
      # 對外服務只留 Cloudflare：gh-pages 首頁改為轉址，僅保留 data/ 供狀態還原。
      - name: 準備 gh-pages 內容（只放 data + 轉址首頁）
        run: |
          rm -rf ghp && mkdir -p ghp/data
          cp dist/data/*.json ghp/data/
          cat > ghp/index.html <<'EOF'
          <!doctype html>
          <html lang="zh-Hant"><head><meta charset="UTF-8">
          <title>已搬遷 → Cloudflare</title>
          <meta http-equiv="refresh" content="0; url=https://taiwan-intel-dashboard.pages.dev/">
          <link rel="canonical" href="https://taiwan-intel-dashboard.pages.dev/">
          </head><body>本站已搬遷至
          <a href="https://taiwan-intel-dashboard.pages.dev/">taiwan-intel-dashboard.pages.dev</a>，正在為您轉址…</body></html>
          EOF

      - name: 推送狀態庫到 gh-pages（force-orphan：單一 commit，體積有界）
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ghp
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "auto: 更新狀態庫（首頁轉址 Cloudflare）"

      # 主要對外服務＝Cloudflare Pages（專案已存在，直接部署）。
      - name: 部署到 Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "03d40efd3c60181edea80af8d927ddc1"
          command: pages deploy dist --project-name=taiwan-intel-dashboard --branch=main

      - name: 失敗/取消通知（Telegram；未設 secrets 靜默跳過）
        if: failure() || cancelled()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            curl -s -m 15 -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d chat_id="$TG_CHAT" \
              --data-urlencode text="⚠️ taiwan-intel-dashboard run ${{ github.run_id }} 狀態 ${{ job.status }}（觸發：${{ github.event_name }}）— https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
          else
            echo "TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID 未設定，跳過通知"
          fi
