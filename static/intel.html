<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福爾摩斯 — 全球情報中心</title>
<script src="https://unpkg.com/globe.gl@2.27.2/dist/globe.gl.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #080c14;
    --panel: #0d1520;
    --border: #1a2d45;
    --accent: #00c8ff;
    --accent2: #ff4444;
    --accent3: #ffc107;
    --accent4: #44ff88;
    --text: #c8d8e8;
    --text-dim: #5a7a9a;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--sans);
    height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 52px; background: var(--panel);
    border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 32px; height: 32px; border: 2px solid var(--accent); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
    color: var(--accent); box-shadow: 0 0 12px rgba(0,200,255,0.3);
  }
  .logo-text { font-family: var(--mono); font-size: 14px; color: var(--accent); letter-spacing: 2px; }
  .logo-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; margin-top: 2px; }
  .header-center { font-family: var(--mono); font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }
  .header-right { display: flex; align-items: center; gap: 20px; }
  .status-dot { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; animation: pulse 2s infinite; }
  .dot.green { background: var(--accent4); box-shadow: 0 0 6px var(--accent4); }
  .dot.red { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation-delay: 0.5s; }
  .dot.yellow { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); animation-delay: 1s; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .clock { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 1px; }
  .nav-link {
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    text-decoration: none; border: 1px solid var(--border); padding: 4px 10px; border-radius: 3px;
  }
  .nav-link:hover { color: var(--accent); border-color: var(--accent); }
  .main { display: flex; flex: 1; overflow: hidden; }
  #globe-container { flex: 1; position: relative; overflow: hidden; }
  #globe { width: 100%; height: 100%; }
  #globe-container::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,200,255,0.015) 2px, rgba(0,200,255,0.015) 4px);
    pointer-events: none; z-index: 10;
  }
  .side-panel {
    width: 340px; background: var(--panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .panel-section { border-bottom: 1px solid var(--border); padding: 16px; }
  .panel-section-title {
    font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 2px;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .panel-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 8px; text-align: center; }
  .stat-card .num { font-family: var(--mono); font-size: 22px; font-weight: bold; line-height: 1; margin-bottom: 4px; }
  .stat-card .lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; }
  .num.blue { color: var(--accent); } .num.red { color: var(--accent2); } .num.yellow { color: var(--accent3); }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; }
  .filter-btn {
    font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 3px;
    border: 1px solid var(--border); background: transparent; color: var(--text-dim);
    cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,200,255,0.08); }
  .filter-btn.red.active { border-color: var(--accent2); color: var(--accent2); background: rgba(255,68,68,0.08); }
  .filter-btn.yellow.active { border-color: var(--accent3); color: var(--accent3); background: rgba(255,193,7,0.08); }
  .filter-btn.green.active { border-color: var(--accent4); color: var(--accent4); background: rgba(68,255,136,0.08); }
  .intel-search {
    width: 100%; margin-top: 10px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; font-size: 12px;
  }
  .intel-search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,200,255,0.08); }
  .intel-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .intel-list::-webkit-scrollbar { width: 3px; }
  .intel-list::-webkit-scrollbar-track { background: transparent; }
  .intel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .intel-item {
    padding: 12px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .intel-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .intel-item.critical::before { background: var(--accent2); }
  .intel-item.warning::before { background: var(--accent3); }
  .intel-item.info::before { background: var(--accent); }
  .intel-item.normal::before { background: var(--accent4); }
  .intel-item:hover { background: rgba(0,200,255,0.05); border-color: rgba(0,200,255,0.3); }
  .intel-item.active { background: rgba(0,200,255,0.08); border-color: var(--accent); }
  .intel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .intel-level { font-family: var(--mono); font-size: 9px; padding: 2px 6px; border-radius: 2px; letter-spacing: 1px; }
  .intel-level.critical { background: rgba(255,68,68,0.2); color: var(--accent2); }
  .intel-level.warning { background: rgba(255,193,7,0.2); color: var(--accent3); }
  .intel-level.info { background: rgba(0,200,255,0.2); color: var(--accent); }
  .intel-level.normal { background: rgba(68,255,136,0.2); color: var(--accent4); }
  .intel-time { font-family: var(--mono); font-size: 9px; color: var(--text-dim); }
  .intel-title { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
  .intel-loc { font-family: var(--mono); font-size: 10px; color: var(--text-dim); display: flex; align-items: center; gap: 4px; }
  .detail-panel {
    position: absolute; bottom: 20px; left: 20px; width: 380px; background: rgba(13,21,32,0.95);
    border: 1px solid var(--accent); border-radius: 8px; padding: 16px; z-index: 50; display: none;
    backdrop-filter: blur(8px); box-shadow: 0 0 30px rgba(0,200,255,0.15);
  }
  .detail-panel.show { display: block; }
  .detail-close { position: absolute; top: 10px; right: 12px; background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; line-height: 1; }
  .detail-close:hover { color: var(--text); }
  .detail-tag { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--accent); margin-bottom: 8px; }
  .detail-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; line-height: 1.4; color: #fff; }
  .detail-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .meta-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 2px; font-family: var(--mono); }
  .meta-value { font-size: 12px; color: var(--text); }
  .detail-desc { font-size: 12px; color: var(--text-dim); line-height: 1.7; border-top: 1px solid var(--border); padding-top: 10px; max-height: 140px; overflow-y: auto; }
  .detail-src { margin-top: 8px; }
  .detail-src a { color: var(--accent); font-size: 11px; text-decoration: none; }
  .source-context {
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    display: grid;
    gap: 5px;
    font-size: 11px;
    line-height: 1.45;
    margin-top: 10px;
    padding-top: 10px;
  }
  .source-context b { color: var(--accent); font-size: 10px; letter-spacing: 1px; }
  .source-context span { display: block; }
  .detail-related { border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px; }
  .rel-row {
    width: 100%; background: rgba(0,200,255,0.04); border: 1px solid var(--border);
    color: var(--text); border-radius: 5px; cursor: pointer; display: grid; gap: 4px;
    margin-top: 6px; padding: 7px; text-align: left;
  }
  .rel-row:hover { border-color: var(--accent); }
  .rel-type { color: var(--accent); font-family: var(--mono); font-size: 9px; }
  .rel-title { font-size: 11px; line-height: 1.35; }
  .rel-why { color: var(--text-dim); font-size: 10px; line-height: 1.35; }
  .left-panel { position: absolute; top: 20px; left: 20px; z-index: 50; display: flex; flex-direction: column; gap: 8px; }
  .mini-card { background: rgba(13,21,32,0.88); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; backdrop-filter: blur(6px); min-width: 180px; }
  .mini-label { font-family: var(--mono); font-size: 9px; color: var(--text-dim); letter-spacing: 1.5px; margin-bottom: 4px; }
  .mini-value { font-family: var(--mono); font-size: 14px; color: var(--accent); }
  .mini-value.ok { color: var(--accent4); }
  .mini-value.bad { color: var(--accent2); }
  .threat-bar { display: flex; gap: 3px; margin-top: 6px; }
  .threat-seg { height: 4px; flex: 1; border-radius: 2px; background: var(--border); }
  .threat-seg.active.l1, .threat-seg.active.l2 { background: var(--accent4); }
  .threat-seg.active.l3, .threat-seg.active.l4 { background: var(--accent3); }
  .threat-seg.active.l5 { background: var(--accent2); }
  .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); color: var(--accent); letter-spacing: 2px; z-index: 60; }
  .top-clusters { display: grid; gap: 6px; max-height: 250px; overflow-y: auto; }
  .cluster-btn {
    background: rgba(0,200,255,0.04); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); cursor: pointer; display: grid; gap: 3px; padding: 8px; text-align: left;
  }
  .cluster-btn:hover { border-color: var(--accent); }
  .cluster-title { font-size: 11px; font-weight: 700; line-height: 1.35; }
  .cluster-meta, .cluster-time { color: var(--text-dim); font-size: 9px; line-height: 1.35; }
  .globe-tip {
    position: absolute; top: 14px; right: 14px; z-index: 55; background: rgba(13,21,32,0.92);
    border: 1px solid var(--accent); border-radius: 8px; color: var(--text); display: none;
    gap: 10px; align-items: center; max-width: 320px; padding: 10px 12px; font-size: 12px;
  }
  .globe-tip.show { display: flex; }
  .globe-tip button {
    background: transparent; border: 1px solid var(--border); border-radius: 999px;
    color: var(--accent); cursor: pointer; padding: 2px 8px; white-space: nowrap;
  }
  @media (max-width: 760px) {
    body { height: auto; min-height: 100vh; overflow: auto; }
    header { height: auto; padding: 10px; align-items: flex-start; gap: 8px; flex-direction: column; }
    .header-right { flex-wrap: wrap; gap: 8px; }
    .main { flex-direction: column; overflow: visible; }
    #globe-container { min-height: 58vh; flex: none; }
    .side-panel { width: 100%; max-height: none; border-left: 0; border-top: 1px solid var(--border); }
    .left-panel { left: 10px; top: 10px; max-width: calc(100% - 20px); }
    .mini-card { min-width: 150px; padding: 8px 10px; }
    .detail-panel { left: 10px; right: 10px; bottom: 10px; width: auto; max-height: 58vh; overflow: auto; }
    .globe-tip { left: 10px; right: 10px; top: auto; bottom: 10px; max-width: none; }
    .filter-btn, .rel-row, .cluster-btn { min-height: 38px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔍</div>
    <div>
      <div class="logo-text">HOLMES &amp; WATSON</div>
      <div class="logo-sub">全球情報中心 · 警政情資 GLOBAL INTELLIGENCE</div>
    </div>
  </div>
  <div class="header-center" id="utc-time">UTC 載入中...</div>
  <div class="header-right">
    <div class="status-dot"><div class="dot green"></div>系統正常</div>
    <div class="status-dot"><div class="dot red"></div><span id="hdr-critical">高威脅 —</span></div>
    <div class="status-dot"><div class="dot yellow"></div><span id="hdr-monitor">監控中 —</span></div>
    <a class="nav-link" href="./query.html">查詢助手 →</a>
    <div class="clock" id="local-clock">--:--:--</div>
  </div>
</header>

<div class="main">
    <div id="globe-container">
    <div id="globe"></div>
    <div class="loading" id="loading">情報資料載入中…</div>
    <div class="globe-tip" id="globe-tip">
      <span>🔗＝點我看關聯；點事件可追整張情報網。</span>
      <button type="button" onclick="dismissTip()">我知道了</button>
    </div>

    <div class="left-panel">
      <div class="mini-card">
        <div class="mini-label">全國情勢等級</div>
        <div class="mini-value" id="threat-level">—</div>
        <div class="threat-bar" id="threat-bar">
          <div class="threat-seg l1"></div><div class="threat-seg l2"></div>
          <div class="threat-seg l3"></div><div class="threat-seg l4"></div><div class="threat-seg l5"></div>
        </div>
      </div>
      <div class="mini-card">
        <div class="mini-label">本小時新進情報</div>
        <div class="mini-value" id="hourly-new">—</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">情報總筆數</div>
        <div class="mini-value" id="total-count">—</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">最新情報時間</div>
        <div class="mini-value" id="latest-time">—</div>
      </div>
    </div>

    <div class="detail-panel" id="detail-panel">
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <div class="detail-tag" id="d-tag">— 情報編號 —</div>
      <div class="detail-title" id="d-title">—</div>
      <div class="detail-meta">
        <div><div class="meta-label">地點</div><div class="meta-value" id="d-loc">—</div></div>
        <div><div class="meta-label">等級</div><div class="meta-value" id="d-level">—</div></div>
        <div><div class="meta-label">類型</div><div class="meta-value" id="d-type">—</div></div>
        <div><div class="meta-label">時間</div><div class="meta-value" id="d-time">—</div></div>
      </div>
      <div class="detail-desc" id="d-desc">—</div>
      <div class="detail-src" id="d-src"></div>
      <div class="detail-related" id="d-related"></div>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-section">
      <div class="panel-section-title">情報統計</div>
      <div class="stats-row">
        <div class="stat-card"><div class="num blue" id="stat-total">—</div><div class="lbl">情報總數</div></div>
        <div class="stat-card"><div class="num red" id="stat-critical">—</div><div class="lbl">高威脅</div></div>
        <div class="stat-card"><div class="num yellow" id="stat-warning">—</div><div class="lbl">需關注</div></div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">篩選</div>
      <div class="filters">
        <button class="filter-btn active" onclick="filterIntel('all', this)">全部</button>
        <button class="filter-btn red" onclick="filterIntel('critical', this)">高威脅</button>
        <button class="filter-btn yellow" onclick="filterIntel('warning', this)">需關注</button>
        <button class="filter-btn" onclick="filterIntel('info', this)">一般</button>
        <button class="filter-btn green" onclick="filterIntel('normal', this)">已解除</button>
        <button class="filter-btn" onclick="filterIntel('cat:協尋', this)">協尋</button>
        <button class="filter-btn" onclick="filterIntel('src:tw-news', this)">社會新聞</button>
      </div>
      <input id="intel-search" class="intel-search" type="search" placeholder="搜尋關鍵字→子網" oninput="searchIntel(this.value)">
    </div>
    <div class="panel-section">
      <div class="panel-section-title">最大情報群</div>
      <div class="top-clusters" id="top-clusters"></div>
    </div>
    <div class="panel-section-title" style="padding: 12px 16px 0; font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 2px;">
      情報列表 <span id="list-count" style="color:var(--text-dim);"></span>
    </div>
    <div class="intel-list" id="intel-list"></div>
  </div>
</div>

<script>
// ── 設定 ──
const LIST_MAX = 1000;    // 列表最多顯示
const GLOBE_MAX = 700;    // 地球儀標點上限（避免過載）
const REFRESH_MS = 300000; // 5 分鐘自動重抓
const NET_ARC_MAX = 600;  // 情報網弧線上限（效能；超出依關聯強度取前 N）

const LEVEL_COLOR = { critical: '#ff4444', warning: '#ffc107', info: '#00c8ff', normal: '#44ff88' };
// 情報網弧線配色（依關聯型別）：佐證=琥珀、共享實體=紫
const ARC_COLOR = { 'same-incident': '#ffc107', 'same-entity': '#b388ff', 'same-topic': '#00c8ff' };
const ARC_TYPE_LABEL = { 'same-incident': '跨源佐證', 'same-entity': '共享實體', 'same-topic': '同題情勢' };
const LEVEL_LABEL = { critical: '高威脅', warning: '需關注', info: '一般情資', normal: '已解除' };
const RISK_TO_LEVEL = { critical: 'critical', high: 'warning', medium: 'info', low: 'normal' };

let ALL = [];          // 全部情報（map 後）
let currentFilter = 'all';
let currentSearch = '';
let NET_ARCS = [];     // 情報網弧線（事件↔事件，已含座標）
let NET_ADJ = new Map();
let NET_CLUSTERS = [];
let NET_CLUSTER_BY_ID = new Map();
let netStats = null;   // { shown, hiddenNational }
let focusArcId = null;
let focusClusterId = null;
let focusClusterMembers = null;
let applyingHash = false;

// ── 工具 ──
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d.getTime())) return String(ts).slice(0, 16).replace('T', ' ');
  const p = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}
function itemById(id) {
  return ALL.find((d) => d.id === id) || null;
}
function sourceTypeLabel(type) {
  if (type === 'gov-open-data') return '開放資料';
  if (type === 'news-rss') return '新聞／RSS';
  if (type === 'cwa') return '中央氣象署';
  if (type === 'manual') return '人工彙整';
  return '未知來源';
}
function sourceContextHtml(item) {
  const rows = [
    `<span><b>完整脈絡</b>${esc(sourceTypeLabel(item.sourceType))}</span>`,
    `<span>資料時間：${esc(fmtTime(item.iso))}</span>`,
  ];
  if (item.sourceFetchedAt) rows.push(`<span>擷取時間：${esc(fmtTime(item.sourceFetchedAt))}</span>`);
  if (item.datasetId) rows.push(`<span>資料集：${esc(item.datasetId)}</span>`);
  if (item.recordRef) rows.push(`<span>原始編號：${esc(item.recordRef)}</span>`);
  if (item.sourceQuery) rows.push(`<span title="${esc(item.sourceQuery)}">可重現查詢</span>`);
  return `<div class="source-context">${rows.join('')}</div>`;
}
function writeHash(mode) {
  if (applyingHash) return;
  const params = new URLSearchParams();
  if (currentFilter && currentFilter !== 'all') params.set('filter', currentFilter);
  if (currentSearch) params.set('q', currentSearch);
  if (focusClusterId) params.set('cluster', focusClusterId);
  else if (focusArcId) params.set('focus', focusArcId);
  const hash = params.toString() ? '#' + params.toString() : '#';
  if (location.hash === hash) return;
  const url = location.pathname + location.search + hash;
  if (mode === 'push') history.pushState(null, '', url);
  else history.replaceState(null, '', url);
}
function setActiveFilterButton(filter) {
  document.querySelectorAll('.filter-btn').forEach((b) => {
    b.classList.toggle('active', b.getAttribute('onclick')?.includes("'" + filter + "'") || (filter === 'all' && b.textContent.trim() === '全部'));
  });

function mapEvent(ev) {

    id: ev.id || '',

// ── 載入資料 ──
async function loadData() {
  const grab = (u) => fetch(u, { cache: 'no-store' }).then((r) => r.json()).catch(() => null);
  const [domestic, international, hourly, network] = await Promise.all([
    grab('./data/domestic.json'),
    grab('./data/international.json'),
    grab('./data/police-hourly-history.json'),
    grab('./data/network.json'),
  ]);
  const events = [...(domestic || []), ...(international || [])];
  const nowMs = Date.now();
  ALL = events.map(mapEvent);
  // 數值時戳排序；離譜未來日期（來源資料瑕疵，>明日）降權至最舊，避免污染「最新情報時間」。
  ALL.forEach((d) => {
    const t = Date.parse(d.iso) || 0;
    d._ts = t > nowMs + 86400000 ? 0 : t;
  });
  ALL.sort((a, b) => b._ts - a._ts);
  // 情報網：建立鄰接表與弧線（需在 ALL 有座標後建）。
  buildNetworkIndex(network && network.domestic);
  buildNetworkArcs(network && network.domestic);

  updateStats(hourly);
  renderTopClusters();
  applyHash();
  const ld = document.getElementById('loading');
  if (ld) ld.style.display = 'none';
}

function updateStats(hourly) {
  const total = ALL.length;
  const crit = ALL.filter((d) => d.level === 'critical').length;
  const warn = ALL.filter((d) => d.level === 'warning').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-critical').textContent = crit;
  document.getElementById('stat-warning').textContent = warn;
  document.getElementById('total-count').textContent = total.toLocaleString();
  document.getElementById('hdr-critical').textContent = '高威脅 ' + crit;
  document.getElementById('hdr-monitor').textContent = '監控中 ' + (crit + warn);
  document.getElementById('latest-time').textContent = (ALL[0] && ALL[0].time) || '—';

  // 本小時新進情報（直接反映 ≥100/hr 目標）。runs 為新到舊排序，runs[0] 才是最新一輪。
  const runs = (hourly && hourly.runs) || [];
  const last = runs[0] || {};
  const newCount = last.newPoliceRelatedCount != null ? last.newPoliceRelatedCount : null;
  const el = document.getElementById('hourly-new');
  if (newCount == null) { el.textContent = '—'; }
  else {
    el.textContent = newCount + ' 筆';
    el.className = 'mini-value ' + (newCount >= 100 ? 'ok' : 'bad');
  }

  // 情勢等級：依高威脅占比
  const ratio = total ? crit / total : 0;
  const lvl = ratio > 0.05 ? 5 : ratio > 0.02 ? 4 : crit > 0 ? 3 : warn > 0 ? 2 : 1;
  const names = { 1: 'LOW', 2: 'GUARDED', 3: 'ELEVATED', 4: 'HIGH', 5: 'SEVERE' };
  document.getElementById('threat-level').textContent = names[lvl];
  document.querySelectorAll('#threat-bar .threat-seg').forEach((seg, i) => {
    seg.classList.toggle('active', i < lvl);
  });
}

// ── Globe ──
const LEVEL_RANK = { critical: 3, warning: 2, info: 1, normal: 0 };

// 穩定 jitter：同縣市多事件座標相同會疊在一點、弧線退化看不見；
// 依事件 id 雜湊產生 ±span 的固定偏移，讓同城事件散開、弧線可見（不竄改原始資料）。
function hashJit(seed, span) {
  let h = 2166136261;
  const s = String(seed);
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return (((h >>> 0) / 4294967295) - 0.5) * span;
}

function buildNetworkIndex(net) {
  NET_ADJ = new Map();
  NET_CLUSTERS = Array.isArray(net?.clusters) ? net.clusters.slice() : [];
  NET_CLUSTER_BY_ID = new Map(NET_CLUSTERS.map((c) => [c.id, c]));
  if (Array.isArray(net?.edges)) {
    for (const e of net.edges) {
      const ab = { id: e.b, type: e.type, weight: e.weight, why: e.why };
      const ba = { id: e.a, type: e.type, weight: e.weight, why: e.why };
      if (!NET_ADJ.has(e.a)) NET_ADJ.set(e.a, []);
      if (!NET_ADJ.has(e.b)) NET_ADJ.set(e.b, []);
      NET_ADJ.get(e.a).push(ab);
      NET_ADJ.get(e.b).push(ba);
    }
  }
  for (const list of NET_ADJ.values()) list.sort((a, b) => b.weight - a.weight);
  window.NET_ADJ = NET_ADJ;
  window.NET_CLUSTERS = NET_CLUSTERS;
  window.__NET_ACTIVE_ARCS = () => NET_ARCS.filter(isArcActive).length;
}

// 把 network.json 的關聯邊轉成 globe 弧線：兩端皆有座標者上圖（依強度取前 N）；
// 全國性（缺座標）關聯無法定位，計數誠實標註、不靜默丟棄。
function buildNetworkArcs(net) {
  NET_ARCS = [];
  netStats = { shown: 0, hiddenNational: 0 };
  if (!net || !Array.isArray(net.edges)) return;
  const coord = new Map();
  for (const d of ALL) if (d.lat != null && d.lng != null) coord.set(d.id, d);
  const JIT = 0.22;
  // 只畫強連結（佐證／共享實體）；same-topic 量大且弱，不上圖避免糊成一片。
  const strong = net.edges.filter((e) => e.type !== 'same-topic').sort((a, b) => b.weight - a.weight);
  const arcs = [];
  let hiddenNational = 0;
  for (const e of strong) {
    const A = coord.get(e.a); const B = coord.get(e.b);
    if (!A || !B) { hiddenNational++; continue; }
    if (arcs.length >= NET_ARC_MAX) continue;
    arcs.push({
      srcId: e.a, dstId: e.b, why: e.why,
      startLat: A.lat + hashJit(e.a + ':la', JIT), startLng: A.lng + hashJit(e.a + ':lo', JIT),
      endLat: B.lat + hashJit(e.b + ':la', JIT), endLng: B.lng + hashJit(e.b + ':lo', JIT),
      type: e.type, weight: e.weight,
    });
  }
  NET_ARCS = arcs;
  window.NET_ARCS = NET_ARCS;
  netStats = { shown: arcs.length, hiddenNational };
}

// 判決依城市分群（密度＝件數）；非判決事件保留個別座標。
function buildGlobeData() {
  const withCoords = ALL.filter((d) => d.lat != null && d.lng != null);
  const byCity = new Map();
  for (const d of withCoords) {
    if (d.type !== '司法判決') continue;
    let c = byCity.get(d.location);
    if (!c) {
      c = { kind: 'cluster', city: d.location, lat: d.lat, lng: d.lng, count: 0, level: 'info', levelRank: 0, items: [] };
      byCity.set(d.location, c);
    }
    c.count += 1;
    if (c.items.length < 40) c.items.push(d);
    const r = LEVEL_RANK[d.level] || 0;
    if (r > c.levelRank) { c.levelRank = r; c.level = d.level; }
  }
  const clusters = [...byCity.values()];
  const maxCount = clusters.reduce((m, c) => Math.max(m, c.count), 1);
  clusters.forEach((c) => { c.norm = c.count / maxCount; });
  const points = withCoords
    .filter((d) => d.type !== '司法判決')
    .slice(0, GLOBE_MAX)
    .map((d) => Object.assign({ kind: 'point' }, d));
  return { combined: [...points, ...clusters], clusters };
}

function clusterLabel(c) {
  const types = {};
  for (const it of c.items) {
    const t = (it.title || '').split('（')[0];
    types[t] = (types[t] || 0) + 1;
  }
  const top = Object.entries(types).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([t, n]) => `${esc(t)} ${n}`).join('、');
  return `<div style="background:rgba(13,21,32,0.92);border:1px solid ${LEVEL_COLOR[c.level]};border-radius:6px;padding:10px 14px;font-family:'Noto Sans TC',sans-serif;min-width:200px;box-shadow:0 0 24px ${LEVEL_COLOR[c.level]}55;">
    <div style="font-size:13px;color:#fff;font-weight:600;margin-bottom:6px;">${esc(c.city)}｜判決 ${c.count} 件</div>
    <div style="font-size:10px;color:#9ab;">${top || '—'}</div>
    <div style="font-size:9px;color:#5a7a9a;margin-top:4px;">點擊聚焦並列出該市判決</div>
  </div>`;
}

function pointLabelHtml(d) {
  return `<div style="background:rgba(13,21,32,0.92);border:1px solid ${LEVEL_COLOR[d.level]};border-radius:6px;padding:10px 14px;font-family:'Noto Sans TC',sans-serif;min-width:200px;box-shadow:0 0 20px ${LEVEL_COLOR[d.level]}44;">
    <div style="font-size:11px;color:#fff;font-weight:600;margin-bottom:6px;">${esc(d.title)}</div>
    <div style="font-size:10px;color:#5a7a9a;">📍 ${esc(d.location)} · ${esc(d.type)}</div>
    <div style="font-size:10px;color:#5a7a9a;">🕐 ${esc(d.time)}</div>
  </div>`;
}

// 點擊城市分群：聚焦該市 + 列表過濾為該市判決。
function focusCity(c) {
  if (window.globeInstance) window.globeInstance.pointOfView({ lat: c.lat, lng: c.lng, altitude: 1.5 }, 1000);
  const data = ALL.filter((d) => d.type === '司法判決' && d.location === c.city).slice(0, LIST_MAX);
  document.getElementById('list-count').textContent = `(${c.city} 判決 ${data.length})`;
  renderListData(data);
}

function isArcActive(d) {
  if (focusArcId) return d.srcId === focusArcId || d.dstId === focusArcId;
  if (focusClusterMembers) return focusClusterMembers.has(d.srcId) && focusClusterMembers.has(d.dstId);
  return true;
}
function redrawArcs() {
  const g = window.globeInstance;
  if (g) g.arcsData(NET_ARCS.slice());
  updateNetLegend();
}
function highlightArcsFor(id) {
  focusArcId = id;
  focusClusterId = null;
  focusClusterMembers = null;
  redrawArcs();
}
function clearNetworkFocus(push) {
  focusArcId = null;
  focusClusterId = null;
  focusClusterMembers = null;
  redrawArcs();
  if (push) writeHash('push');
}
function clusterMembers(c) {
  return new Set((c && Array.isArray(c.members)) ? c.members : []);
}
function focusNetworkCluster(id, push) {
  const c = NET_CLUSTER_BY_ID.get(id);
  if (!c) return;
  focusClusterId = id;
  focusArcId = null;
  focusClusterMembers = clusterMembers(c);
  const members = ALL.filter((d) => focusClusterMembers.has(d.id));
  const located = members.filter((d) => d.lat != null && d.lng != null);
  if (window.globeInstance && located.length) {
    const lat = located.reduce((sum, d) => sum + d.lat, 0) / located.length;
    const lng = located.reduce((sum, d) => sum + d.lng, 0) / located.length;
    window.globeInstance.pointOfView({ lat, lng, altitude: 1.7 }, 1000);
  }
  document.getElementById('list-count').textContent = `(情報群 ${members.length})`;
  renderListData(members.slice(0, LIST_MAX));
  redrawArcs();
  if (push) writeHash('push');
}
function renderTopClusters() {
  const el = document.getElementById('top-clusters');
  const top = NET_CLUSTERS
    .slice()
    .sort((a, b) => b.size - a.size || Date.parse(b.latestTs || '') - Date.parse(a.latestTs || ''))
    .slice(0, 8);
  el.innerHTML = top.length
    ? top.map((c) => `<button class="cluster-btn" type="button" onclick="focusNetworkCluster('${esc(c.id)}', true)">
        <span class="cluster-title">${esc(c.representativeTitle || c.id)}</span>
        <span class="cluster-meta">${esc(c.topCategory || '情報')}｜${esc((c.regions || []).join('、') || '未標地區')}｜${c.sourceCount || 0} 源 · ${c.size} 則</span>
        <span class="cluster-time">${esc(fmtTime(c.latestTs))}</span>
      </button>`).join('')
    : '<div class="cluster-meta">尚無可展開的情報群</div>';
}
function applySearchSubnet(pool) {
  const q = currentSearch.trim().toLocaleLowerCase('zh-TW');
  if (!q) return pool;
  const available = new Set(pool.map((d) => d.id));
  const ids = new Set();
  for (const d of pool) {
    const hay = `${d.title} ${d.desc} ${d.location} ${d.type} ${d.srcName}`.toLocaleLowerCase('zh-TW');
    if (!hay.includes(q)) continue;
    ids.add(d.id);
    for (const r of NET_ADJ.get(d.id) || []) if (available.has(r.id)) ids.add(r.id);
  }
  return pool.filter((d) => ids.has(d.id));
}
function searchIntel(q) {
  currentSearch = String(q || '').trim();
  focusArcId = null;
  focusClusterId = null;
  focusClusterMembers = null;
  renderList(currentFilter);
  redrawArcs();
  writeHash('replace');
}
function applyHash() {
  applyingHash = true;
  const params = new URLSearchParams(location.hash.replace(/^#/, ''));
  currentFilter = params.get('filter') || 'all';
  currentSearch = params.get('q') || '';
  const search = document.getElementById('intel-search');
  if (search) search.value = currentSearch;
  setActiveFilterButton(currentFilter);
  const cluster = params.get('cluster');
  const focus = params.get('focus');
  if (cluster && NET_CLUSTER_BY_ID.has(cluster)) {
    focusNetworkCluster(cluster, false);
  } else if (focus && itemById(focus)) {
    selectIntel(focus);
  } else {
    clearNetworkFocus(false);
    renderList(currentFilter);
  }
  updateGlobe();
  applyingHash = false;
}

function updateGlobe() {
  const g = window.globeInstance;
  if (!g) return;
  const { combined, clusters } = buildGlobeData();
  g.pointsData(combined);
  const critPoints = combined.filter((d) => d.kind === 'point' && d.level === 'critical').slice(0, 30);
  const topCities = [...clusters].sort((a, b) => b.count - a.count).slice(0, 6);
  g.ringsData([...critPoints, ...topCities]);
  g.arcsData(NET_ARCS.slice());
  updateNetLegend();
}

// 情報網圖例（左下角固定浮層）：顯示弧線數與配色說明。
function updateNetLegend() {
  let el = document.getElementById('net-legend');
  if (!el) {
    el = document.createElement('div');
    el.id = 'net-legend';
    el.style.cssText = 'position:fixed;left:14px;bottom:14px;z-index:50;background:rgba(13,21,32,0.86);' +
      'border:1px solid #2a3a4a;border-radius:8px;padding:9px 12px;font-family:"Noto Sans TC",sans-serif;' +
      'font-size:11px;color:#9ab;line-height:1.7;box-shadow:0 0 20px #0008;pointer-events:none;';
    document.body.appendChild(el);
  }
  const s = netStats || { shown: 0, hiddenNational: 0 };
  const active = NET_ARCS.filter(isArcActive).length;
  const chip = (c, t) => `<span style="display:inline-block;width:18px;height:3px;background:${c};vertical-align:middle;margin-right:5px;border-radius:2px;"></span>${t}`;
  el.innerHTML =
    `<div style="color:#cfe;font-weight:600;margin-bottom:3px;">🕸 情報網　<span style="color:#ffc107;">${focusArcId || focusClusterId ? active + '/' : ''}${s.shown}</span> 條關聯</div>` +
    `<div>${chip(ARC_COLOR['same-incident'], ARC_TYPE_LABEL['same-incident'])}</div>` +
    `<div>${chip(ARC_COLOR['same-entity'], ARC_TYPE_LABEL['same-entity'])}</div>` +
    (s.hiddenNational ? `<div style="color:#5a7a9a;margin-top:3px;">另 ${s.hiddenNational} 條全國性關聯未在圖上</div>` : '');
}
function initGlobe() {
  const container = document.getElementById('globe');
  const globe = Globe()(container)
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
    .width(container.parentElement.offsetWidth)
    .height(container.parentElement.offsetHeight)
    .pointLat('lat').pointLng('lng')
    .pointColor((d) => LEVEL_COLOR[d.level] || '#00c8ff')
    .pointRadius((d) =>
      d.kind === 'cluster'
        ? 0.4 + Math.sqrt(d.count) * 0.16
        : d.level === 'critical' ? 0.5 : d.level === 'warning' ? 0.38 : 0.26)
    .pointAltitude((d) => (d.kind === 'cluster' ? 0.04 + d.norm * 0.5 : 0.012))
    .pointLabel((d) => (d.kind === 'cluster' ? clusterLabel(d) : pointLabelHtml(d)))
    .onPointClick((d) => (d.kind === 'cluster' ? focusCity(d) : selectIntel(d.id)))
    .ringLat('lat').ringLng('lng')
    .ringColor(() => '#ff444488').ringMaxRadius(3).ringPropagationSpeed(1.5).ringRepeatPeriod(1200)
    .arcStartLat((d) => d.startLat).arcStartLng((d) => d.startLng)
    .arcEndLat((d) => d.endLat).arcEndLng((d) => d.endLng)
    .arcColor((d) => {
      const c = ARC_COLOR[d.type] || '#00c8ff';
      const on = isArcActive(d);
      return on ? [c + '00', c + 'ee', c + '00'] : [c + '00', c + '22', c + '00'];
    })
    .arcStroke((d) => (isArcActive(d) ? (d.type === 'same-incident' ? 0.72 : 0.56) : 0.12))
    .arcLabel((d) => `${ARC_TYPE_LABEL[d.type] || d.type}（強度 ${Number(d.weight).toFixed(1)}）${d.why ? '｜' + esc(d.why) : ''}`)
    .arcDashLength(0.5).arcDashGap(0.25).arcDashAnimateTime(1800).arcAltitudeAutoScale((d) => (isArcActive(d) ? 0.45 : 0.18))
    .pointOfView({ lat: 23.5, lng: 121, altitude: 2.2 }, 0);
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.25;
  globe.controls().enableZoom = true;
  window.globeInstance = globe;
  window.addEventListener('resize', () => {
    globe.width(container.parentElement.offsetWidth).height(container.parentElement.offsetHeight);
  });
  updateGlobe();
}

// ── 啟動 ──
window.addEventListener('load', () => {
  initGlobe();
  renderTip();
  loadData();
  setInterval(loadData, REFRESH_MS); // 每 5 分鐘自動刷新情報
});
window.addEventListener('hashchange', applyHash);
window.addEventListener('popstate', applyHash);
</script>
</body>
</html>
